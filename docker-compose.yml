services:
  db:
    image: postgres:15-alpine
    container_name: pathforge-db
    restart: always
    environment:
      POSTGRES_DB: pathforge_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: pathforge-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/pathforge_db
      - SECRET_KEY=prod_secret_key_change_me
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - GROQ_API_KEY=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
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://127.0.0.1
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    container_name: pathforge-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
